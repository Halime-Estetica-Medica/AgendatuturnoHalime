<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Halime · Reservá tu turno</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root{
    --brown:#1a1410;
    --rose-bg:#f7e8ef;
    --rose:#e8a0bb;
    --gold:#c9a96e;
    --warm-white:#f5f0eb;
    --white:#fffdfb;
    --error:#b5544a;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:var(--warm-white);
    font-family:'Jost',sans-serif;
    color:var(--brown);
    min-height:100vh;
    display:flex;
    justify-content:center;
    padding:32px 16px 64px;
  }
  .wrap{width:100%;max-width:480px;}
  h1,h2,h3{font-family:'Cormorant Garamond',serif;font-weight:600;margin:0;}
  h1{font-size:2.1rem;letter-spacing:.02em;color:var(--brown);}
  h2{font-size:1.4rem;color:var(--brown);}
  .eyebrow{
    font-size:.72rem;letter-spacing:.18em;text-transform:uppercase;
    color:var(--rose);font-weight:500;margin-bottom:6px;
  }
  .header{text-align:center;margin-bottom:36px;}
  .divider{width:40px;height:2px;background:var(--gold);margin:14px auto 0;}
  .card{
    background:var(--white);
    border-radius:18px;
    padding:28px 24px;
    box-shadow:0 8px 30px rgba(26,20,16,.06);
    border:1px solid rgba(201,169,110,.18);
  }
  .field{margin-bottom:16px;}
  label{font-size:.82rem;color:#7a6f66;display:block;margin-bottom:6px;}
  input[type=text], input[type=password], input[type=date], input[type=time]{
    width:100%;padding:12px 14px;border-radius:10px;
    border:1px solid rgba(26,20,16,.15);
    font-family:'Jost',sans-serif;font-size:1rem;background:var(--warm-white);
    color:var(--brown);
  }
  input:focus{outline:2px solid var(--gold);outline-offset:1px;}
  button{
    font-family:'Jost',sans-serif;font-weight:500;font-size:.95rem;
    border:none;border-radius:999px;padding:13px 22px;cursor:pointer;
    transition:transform .15s ease, box-shadow .15s ease;
  }
  button:active{transform:scale(.97);}
  .btn-primary{
    background:var(--brown);color:var(--warm-white);width:100%;
  }
  .btn-primary:hover{box-shadow:0 4px 16px rgba(26,20,16,.25);}
  .btn-secondary{background:var(--rose-bg);color:var(--brown);}
  .btn-ghost{background:transparent;color:#7a6f66;text-decoration:underline;padding:6px 0;}
  .msg{
    padding:14px 16px;border-radius:10px;font-size:.92rem;line-height:1.5;
  }
  .msg.error{background:#fbeceb;color:var(--error);}
  .msg.info{background:var(--rose-bg);color:var(--brown);}
  .msg.success{background:#eef4ea;color:#4a6b3f;}
  .day-group{margin-bottom:22px;}
  .day-label{
    font-size:.85rem;font-weight:500;color:var(--brown);
    display:flex;align-items:center;gap:8px;margin-bottom:10px;
  }
  .day-label::after{content:"";flex:1;height:1px;background:rgba(26,20,16,.1);}
  .slots{display:flex;flex-wrap:wrap;gap:8px;}
  .slot-btn{
    background:var(--warm-white);border:1px solid var(--gold);color:var(--brown);
    border-radius:999px;padding:9px 16px;font-size:.9rem;cursor:pointer;
  }
  .slot-btn:hover{background:var(--gold);color:var(--white);}
  .confirm-box{text-align:center;}
  .confirm-box .gold-dot{
    width:10px;height:10px;border-radius:50%;background:var(--gold);
    display:inline-block;margin-bottom:14px;
  }
  .admin-table{width:100%;border-collapse:collapse;font-size:.85rem;margin-top:12px;}
  .admin-table th{text-align:left;font-weight:500;color:#7a6f66;padding:8px 6px;border-bottom:1px solid rgba(26,20,16,.1);}
  .admin-table td{padding:8px 6px;border-bottom:1px solid rgba(26,20,16,.06);}
  .pill{font-size:.72rem;padding:3px 10px;border-radius:999px;font-weight:500;}
  .pill.si{background:#eef4ea;color:#4a6b3f;}
  .pill.no{background:#fbeceb;color:var(--error);}
  .tabs{display:flex;gap:8px;margin-bottom:20px;}
  .tab{
    flex:1;text-align:center;padding:10px;border-radius:10px;font-size:.85rem;
    background:var(--rose-bg);cursor:pointer;color:#7a6f66;
  }
  .tab.active{background:var(--brown);color:var(--warm-white);}
  .link-copy{
    display:flex;gap:6px;align-items:center;background:var(--warm-white);
    padding:8px 10px;border-radius:8px;font-size:.78rem;word-break:break-all;
    margin-top:6px;
  }
  .link-copy button{padding:6px 12px;font-size:.75rem;flex-shrink:0;}
  .hidden{display:none;}
  .loading{text-align:center;color:#7a6f66;font-size:.9rem;padding:20px 0;}
  .config-warn{
    background:#fbeceb;color:var(--error);padding:16px;border-radius:10px;
    font-size:.85rem;line-height:1.6;
  }
</style>
</head>
<body>
<div class="wrap">
  <div class="header">
    <div class="eyebrow">Halime Estética Médica</div>
    <h1 id="mainTitle">Reservá tu turno</h1>
    <div class="divider"></div>
  </div>
  <div id="app"></div>
</div>

<script>
/* ======================================================
   CONFIGURACIÓN — pegá acá tus credenciales de Supabase
   ====================================================== */
const SUPABASE_URL = "https://niewrqtmwtrnzfzwxdof.supabase.co/rest/v1/";
const SUPABASE_ANON_KEY = "sb_publishable_HA19ojdB0CVZAJ7aENjSTw_eJR2VgSH";

/* Contraseña del panel admin — cambiala si querés */
const ADMIN_PASSWORD = "halimeturnos2026";

/* ====================================================== */

const configured = !SUPABASE_URL.includes("PEGAR_TU") && !SUPABASE_ANON_KEY.includes("PEGAR_TU");
const supabase = configured ? window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY) : null;

const app = document.getElementById("app");
const mainTitle = document.getElementById("mainTitle");
const params = new URLSearchParams(window.location.search);
const isAdmin = params.get("admin") === "1";
const codeFromUrl = params.get("c");

function render(html){ app.innerHTML = html; }
function esc(s){ const d=document.createElement("div"); d.textContent=s; return d.innerHTML; }
function genCodigo(){
  const chars = "ABCDEFGHJKLMNPQRSTUVWXYZ23456789";
  let out = "";
  for(let i=0;i<6;i++) out += chars[Math.floor(Math.random()*chars.length)];
  return out;
}

if(!configured){
  render(`<div class="card"><div class="config-warn">
    Esta app todavía no tiene las credenciales de Supabase cargadas.<br><br>
    Abrí el archivo HTML, buscá la sección CONFIGURACIÓN al final y pegá tu
    <strong>Project URL</strong> y tu <strong>anon key</strong> (los encontrás en
    Supabase → Project Settings → API).
  </div></div>`);
} else if(isAdmin){
  mainTitle.textContent = "Panel de turnos";
  initAdmin();
} else {
  initCliente();
}

/* ============ VISTA CLIENTA ============ */

function initCliente(){
  if(codeFromUrl){
    lookupClienta(codeFromUrl);
  } else {
    render(`
      <div class="card">
        <div class="field">
          <label>Ingresá tu código de acceso</label>
          <input type="text" id="codigoInput" placeholder="Ej: 7K2P9X" style="text-transform:uppercase">
        </div>
        <button class="btn-primary" onclick="submitCodigo()">Ver horarios disponibles</button>
        <div id="feedback" style="margin-top:14px;"></div>
      </div>
    `);
  }
}

window.submitCodigo = function(){
  const val = document.getElementById("codigoInput").value.trim().toUpperCase();
  if(!val) return;
  lookupClienta(val);
}

async function lookupClienta(codigo){
  render(`<div class="loading">Buscando tu reserva…</div>`);
  const { data: clienta, error } = await supabase
    .from("clientas").select("*").eq("codigo", codigo.toUpperCase()).maybeSingle();

  if(error || !clienta){
    render(`<div class="card">
      <div class="msg error">Ese código no es válido. Revisá el link o escribinos por WhatsApp.</div>
    </div>`);
    return;
  }

  if(!clienta.pago_confirmado){
    render(`<div class="card">
      <div class="msg info">Hola ${esc(clienta.nombre)} 🤍<br><br>
      Todavía no tenemos registrado tu anticipo. Apenas lo confirmemos vas a poder elegir tu horario acá mismo.</div>
    </div>`);
    return;
  }

  const { data: yaReservado } = await supabase
    .from("turnos").select("*").eq("clienta_id", clienta.id).maybeSingle();

  if(yaReservado){
    showConfirmado(clienta, yaReservado);
    return;
  }

  const { data: disponibles } = await supabase
    .from("turnos").select("*").eq("disponible", true)
    .order("fecha", { ascending:true }).order("hora", { ascending:true });

  if(!disponibles || disponibles.length === 0){
    render(`<div class="card">
      <div class="msg info">Hola ${esc(clienta.nombre)} 🤍<br><br>
      Por el momento no hay horarios cargados para esta sesión. Te avisamos apenas se habiliten.</div>
    </div>`);
    return;
  }

  renderSlots(clienta, disponibles);
}

function renderSlots(clienta, turnos){
  const porDia = {};
  turnos.forEach(t => {
    if(!porDia[t.fecha]) porDia[t.fecha] = [];
    porDia[t.fecha].push(t);
  });

  const fmtFecha = (f) => {
    const d = new Date(f + "T00:00:00");
    return d.toLocaleDateString("es-AR", { weekday:"long", day:"numeric", month:"long" });
  };
  const fmtHora = (h) => h.slice(0,5);

  let html = `<div class="card">
    <p style="font-size:.9rem;color:#7a6f66;margin-top:0;">Hola ${esc(clienta.nombre)}, elegí el horario que más te sirva:</p>`;

  Object.keys(porDia).sort().forEach(fecha => {
    html += `<div class="day-group">
      <div class="day-label">${fmtFecha(fecha)}</div>
      <div class="slots">`;
    porDia[fecha].forEach(t => {
      html += `<button class="slot-btn" onclick="tomarTurno('${t.id}','${clienta.id}','${clienta.codigo}')">${fmtHora(t.hora)}</button>`;
    });
    html += `</div></div>`;
  });
  html += `<div id="slotFeedback"></div></div>`;
  render(html);
}

window.tomarTurno = async function(turnoId, clientaId, codigo){
  document.getElementById("slotFeedback").innerHTML = `<div class="loading">Confirmando…</div>`;

  const { data, error } = await supabase
    .from("turnos")
    .update({ disponible:false, clienta_id: clientaId })
    .eq("id", turnoId).eq("disponible", true)
    .select();

  if(error || !data || data.length === 0){
    document.getElementById("slotFeedback").innerHTML =
      `<div class="msg error">Uy, ese horario se acaba de ocupar. Elegí otro de la lista.</div>`;
    setTimeout(() => lookupClienta(codigo), 1200);
    return;
  }

  lookupClienta(codigo);
}

function showConfirmado(clienta, turno){
  const d = new Date(turno.fecha + "T00:00:00");
  const fecha = d.toLocaleDateString("es-AR", { weekday:"long", day:"numeric", month:"long" });
  const hora = turno.hora.slice(0,5);
  render(`<div class="card confirm-box">
    <span class="gold-dot"></span>
    <h2>¡Turno confirmado!</h2>
    <p style="color:#7a6f66;margin:14px 0 4px;">${fecha}</p>
    <p style="font-size:1.6rem;font-family:'Cormorant Garamond',serif;margin:0 0 18px;">${hora} hs</p>
    <p style="font-size:.85rem;color:#7a6f66;">Te esperamos, ${esc(clienta.nombre)} 🤍</p>
  </div>`);
}

/* ============ VISTA ADMIN ============ */

function initAdmin(){
  render(`<div class="card">
    <div class="field">
      <label>Contraseña</label>
      <input type="password" id="adminPass">
    </div>
    <button class="btn-primary" onclick="checkAdminPass()">Entrar</button>
    <div id="adminFeedback" style="margin-top:12px;"></div>
  </div>`);
}

window.checkAdminPass = function(){
  const val = document.getElementById("adminPass").value;
  if(val === ADMIN_PASSWORD){
    renderAdminPanel();
  } else {
    document.getElementById("adminFeedback").innerHTML = `<div class="msg error">Contraseña incorrecta.</div>`;
  }
}

let adminTab = "clientas";

async function renderAdminPanel(){
  render(`
    <div class="tabs">
      <div class="tab ${adminTab==='clientas'?'active':''}" onclick="switchTab('clientas')">Clientas</div>
      <div class="tab ${adminTab==='turnos'?'active':''}" onclick="switchTab('turnos')">Horarios</div>
    </div>
    <div id="tabContent"></div>
  `);
  if(adminTab === "clientas") loadClientasTab();
  else loadTurnosTab();
}

window.switchTab = function(tab){
  adminTab = tab;
  renderAdminPanel();
}

async function loadClientasTab(){
  document.getElementById("tabContent").innerHTML = `<div class="loading">Cargando…</div>`;
  const { data: clientas } = await supabase.from("clientas").select("*").order("created_at", { ascending:false });

  let rows = "";
  (clientas || []).forEach(c => {
    const link = `${window.location.origin}${window.location.pathname}?c=${c.codigo}`;
    rows += `<tr>
      <td>${esc(c.nombre)}</td>
      <td>${esc(c.whatsapp)}</td>
      <td><span class="pill ${c.pago_confirmado?'si':'no'}">${c.pago_confirmado?'Pagó':'Pendiente'}</span></td>
      <td><button class="btn-secondary" style="padding:6px 12px;font-size:.75rem;" onclick="togglePago('${c.id}', ${!c.pago_confirmado})">${c.pago_confirmado?'Revertir':'Confirmar pago'}</button></td>
    </tr>
    <tr><td colspan="4"><div class="link-copy"><span style="flex:1;">${link}</span><button class="btn-ghost" onclick="copyLink('${link}')">Copiar</button></div></td></tr>`;
  });

  document.getElementById("tabContent").innerHTML = `
    <div class="card" style="margin-bottom:18px;">
      <h2 style="margin-bottom:14px;">Agregar clienta</h2>
      <div class="field"><label>Nombre</label><input type="text" id="nuevoNombre"></div>
      <div class="field"><label>WhatsApp</label><input type="text" id="nuevoWhatsapp"></div>
      <button class="btn-primary" onclick="agregarClienta()">Agregar</button>
      <div id="clienteFeedback" style="margin-top:10px;"></div>
    </div>
    <div class="card">
      <h2 style="margin-bottom:6px;">Clientas cargadas</h2>
      <table class="admin-table">
        <tr><th>Nombre</th><th>WhatsApp</th><th>Estado</th><th></th></tr>
        ${rows || '<tr><td colspan="4" style="color:#7a6f66;">Todavía no hay clientas cargadas.</td></tr>'}
      </table>
    </div>
  `;
}

window.agregarClienta = async function(){
  const nombre = document.getElementById("nuevoNombre").value.trim();
  const whatsapp = document.getElementById("nuevoWhatsapp").value.trim();
  if(!nombre || !whatsapp){
    document.getElementById("clienteFeedback").innerHTML = `<div class="msg error">Completá nombre y WhatsApp.</div>`;
    return;
  }
  const codigo = genCodigo();
  const { error } = await supabase.from("clientas").insert({ nombre, whatsapp, codigo, pago_confirmado:false });
  if(error){
    document.getElementById("clienteFeedback").innerHTML = `<div class="msg error">Error al guardar. Probá de nuevo.</div>`;
    return;
  }
  loadClientasTab();
}

window.togglePago = async function(id, nuevoValor){
  await supabase.from("clientas").update({ pago_confirmado: nuevoValor }).eq("id", id);
  loadClientasTab();
}

window.copyLink = function(link){
  navigator.clipboard.writeText(link);
}

async function loadTurnosTab(){
  document.getElementById("tabContent").innerHTML = `<div class="loading">Cargando…</div>`;
  const { data: turnos } = await supabase.from("turnos").select("*, clientas(nombre)").order("fecha").order("hora");

  let rows = "";
  (turnos || []).forEach(t => {
    const fecha = new Date(t.fecha + "T00:00:00").toLocaleDateString("es-AR", { day:"numeric", month:"short" });
    const hora = t.hora.slice(0,5);
    const estado = t.disponible ? `<span class="pill si">Libre</span>` : `<span class="pill no">${t.clientas ? esc(t.clientas.nombre) : 'Ocupado'}</span>`;
    rows += `<tr>
      <td>${fecha}</td><td>${hora}</td><td>${estado}</td>
      <td><button class="btn-ghost" onclick="eliminarTurno('${t.id}')">Eliminar</button></td>
    </tr>`;
  });

  document.getElementById("tabContent").innerHTML = `
    <div class="card" style="margin-bottom:18px;">
      <h2 style="margin-bottom:14px;">Agregar horario</h2>
      <div class="field"><label>Fecha</label><input type="date" id="nuevaFecha"></div>
      <div class="field"><label>Hora</label><input type="time" id="nuevaHora"></div>
      <button class="btn-primary" onclick="agregarTurno()">Agregar horario</button>
      <div id="turnoFeedback" style="margin-top:10px;"></div>
    </div>
    <div class="card">
      <h2 style="margin-bottom:6px;">Horarios de la sesión</h2>
      <table class="admin-table">
        <tr><th>Fecha</th><th>Hora</th><th>Estado</th><th></th></tr>
        ${rows || '<tr><td colspan="4" style="color:#7a6f66;">Todavía no hay horarios cargados.</td></tr>'}
      </table>
    </div>
  `;
}

window.agregarTurno = async function(){
  const fecha = document.getElementById("nuevaFecha").value;
  const hora = document.getElementById("nuevaHora").value;
  if(!fecha || !hora){
    document.getElementById("turnoFeedback").innerHTML = `<div class="msg error">Completá fecha y hora.</div>`;
    return;
  }
  const { error } = await supabase.from("turnos").insert({ fecha, hora, disponible:true });
  if(error){
    document.getElementById("turnoFeedback").innerHTML = `<div class="msg error">Error al guardar. Probá de nuevo.</div>`;
    return;
  }
  loadTurnosTab();
}

window.eliminarTurno = async function(id){
  await supabase.from("turnos").delete().eq("id", id);
  loadTurnosTab();
}
</script>
</body>
</html>
